# ClusterIssuer: Konfiguriert cert-manager, um automatisch Zertifikate
# von Let's Encrypt anzufordern. Ein ClusterIssuer ist cluster-weit verfügbar
# (im Gegensatz zu einem Issuer, der nur in einem Namespace funktioniert).

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  acme:
    # ACME-Server URL von Let's Encrypt für Production-Zertifikate
    # (Für Testing gibt es: https://acme-staging-v02.api.letsencrypt.org/directory)
    server: https://acme-v02.api.letsencrypt.org/directory
    
    # Email-Adresse für Let's Encrypt Benachrichtigungen
    # (z.B. bei ablaufenden Zertifikaten oder wichtigen Updates)
    email: marcel.mende0@gmail.com
    
    # Secret, in dem der private ACME Account Key gespeichert wird
    # (wird automatisch erstellt beim ersten Zertifikatsantrag)
    privateKeySecretRef:
      name: letsencrypt-prod
    
    # Solver: Definiert, wie die Domain-Validierung durchgeführt wird
    solvers:
    # HTTP-01 Challenge: Let's Encrypt prüft Domain-Besitz durch
    # Zugriff auf http://<domain>/.well-known/acme-challenge/<token>
    - http01:
        ingress:
          # Ingress Class, die für die Challenge verwendet wird
          # (muss mit deinem Ingress Controller übereinstimmen)
          class: nginx